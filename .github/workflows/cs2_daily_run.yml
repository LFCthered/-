name: CS2 Daily Auto Scraper

on:
  schedule:
    - cron: '30 9 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install Dependencies
        run: |
          pip install crawlee playwright browserforge google-api-python-client google-auth-httplib2 google-auth-oauthlib httplib2 pysocks
          playwright install chromium
      - name: Restore Token
        run: echo "${{ secrets.TOKEN_BASE64 }}" | base64 -d > token.pickle
      - name: Run Scraper
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python main.py
