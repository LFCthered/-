name: CS2 Daily Auto Scraper

on:
  schedule:
    - cron: '10 9 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: Install Dependencies
        run: |
          pip install crawlee playwright google-api-python-client google-auth-httplib2 google-auth-oauthlib
          playwright install chromium

      # 👇 就是这一步，负责把密码本复原
      - name: Restore Token
        run: echo "${{ secrets.TOKEN_BASE64 }}" | base64 -d > token.pickle

      # 👇 紧接着运行你的爬虫脚本
      - name: Run Scraper
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python main.py
